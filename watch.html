<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B1220" />
<title>FlightDrop — Watch Detail</title>
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="stylesheet" href="/styles.css" />
<script src="/airports.js"></script>
</head>
<body>
<header class="topbar">
  <div>
    <div class="wordmark"><span>←</span> <a href="/index.html" style="color:var(--amber)">Back</a></div>
  </div>
</header>

<main id="content">
  <div class="empty-state"><div class="flap">···</div><p>Loading watch…</p></div>
</main>

<nav class="bottom-nav">
  <a href="/index.html" data-page="index.html"><span class="icon">▣</span>Dashboard</a>
  <a href="/add.html" data-page="add.html"><span class="icon">＋</span>Add Watch</a>
  <a href="/settings.html" data-page="settings.html"><span class="icon">⚙</span>Settings</a>
</nav>

<script src="/app.js"></script>
<script>
const params = new URLSearchParams(location.search);
const watchId = params.get("id");
const content = document.getElementById("content");

function bookingLinks(watch) {
  const leg = (watch.legs || [])[0] || {};
  const q = encodeURIComponent(`${leg.from || ""} to ${leg.to || ""}`);
  return [
    { label: "Google Flights", url: `https://www.google.com/travel/flights?q=${q}` },
    { label: "Trip.com", url: `https://www.trip.com/flights/` },
    { label: "Booking.com", url: `https://www.booking.com/flights/` },
  ];
}

function codeToCity(code) {
  const match = (window.FLIGHTDROP_AIRPORTS || []).find((a) => a.code === code);
  return match ? match.city : "";
}

async function load() {
  if (!watchId) {
    content.innerHTML = `<div class="empty-state"><h2>Missing watch id</h2></div>`;
    return;
  }
  try {
    const watch = await FD.api(`/api/watch/${watchId}`);
    render(watch);
  } catch (err) {
    content.innerHTML = `<div class="empty-state"><h2>Couldn't load watch</h2><p>${FD.escapeHtml(err.message)}</p></div>`;
  }
}

function render(watch) {
  const status = FD.watchStatus(watch);
  const legs = (watch.legs || []).map((l) => {
    const route = `${FD.escapeHtml(l.from) || "?"} → ${FD.escapeHtml(l.to) || "?"}`;
    const dateLabel = FD.formatShortDate(l.date);
    return dateLabel ? `${route} (${dateLabel})` : route;
  }).join(" · ") || FD.escapeHtml(watch.route_type);

  content.innerHTML = `
    <div class="card watch-card" data-status="${status}">
      <div class="row-top">
        <div>
          <div class="name" style="font-size:19px;">${FD.escapeHtml(watch.name)}</div>
          <div class="route">${legs}</div>
        </div>
      </div>
      <span class="status-pill">${FD.statusLabel(status)}</span>
      <div class="platform-badges" id="platform-badges"></div>
      <div class="link-row" id="booking-links"></div>
    </div>

    <div class="card">
      <div class="section-label" style="margin-top:0;">Price</div>
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span id="price-flap"></span>
        <span style="font-size:12px; color:var(--ink-2);">Target ${FD.formatMoney(watch.target_price, watch.currency)}</span>
      </div>
      <div style="font-size:12px; color:var(--ink-2); margin-top:6px;">Lowest seen: ${FD.formatMoney(watch.lowest_seen_price, watch.currency)}</div>
    </div>

    <div class="card">
      <div class="section-label" style="margin-top:0;">AI price suggestion</div>
      <div id="ai-suggestion-content"></div>
    </div>

    <div class="card">
      <div class="section-label" style="margin-top:0;">Price history</div>
      <div id="price-history"></div>
    </div>

    <div class="card">
      <div class="section-label" style="margin-top:0;">Notification log</div>
      <div id="notif-log"></div>
    </div>

    ${watch.notes ? `<div class="card"><div class="section-label" style="margin-top:0;">Notes</div><p style="font-size:13px; color:var(--ink-1);">${FD.escapeHtml(watch.notes)}</p></div>` : ""}

    <button class="btn btn-secondary" id="edit-watch">Edit this watch</button>
    <div style="height:10px;"></div>
    <button class="btn btn-danger" id="deactivate">${watch.active ? "Deactivate this watch" : "Reactivate this watch"}</button>
    <div style="height:10px;"></div>
    <button class="btn btn-danger" id="delete-watch">Delete this watch</button>
  `;

  document.getElementById("price-flap").appendChild(FD.renderFlap(FD.formatMoney(watch.last_seen_price, watch.currency)));

  const badgesEl = document.getElementById("platform-badges");
  const platformLabels = (window.FLIGHTDROP_PLATFORMS || []).filter((p) => (watch.platforms || []).includes(p.key));
  badgesEl.innerHTML = platformLabels.length
    ? platformLabels.map((p) => `<span class="badge">${FD.escapeHtml(p.label)}</span>`).join("")
    : "";

  const linksEl = document.getElementById("booking-links");
  bookingLinks(watch).forEach((l) => {
    const a = document.createElement("a");
    a.href = l.url; a.target = "_blank"; a.rel = "noopener";
    a.textContent = l.label;
    linksEl.appendChild(a);
  });

  const aiEl = document.getElementById("ai-suggestion-content");
  renderAiSuggestion(aiEl, watch);

  const history = document.getElementById("price-history");
  const events = (watch.priceEvents || []).filter((e) => e.extracted_price != null);
  history.innerHTML = events.length
    ? events.map((e) => `
        <div class="event-row">
          <span>${FD.formatMoney(e.extracted_price, e.currency || watch.currency)}</span>
          <span class="meta">${new Date(e.received_at).toLocaleString()}${e.match_method === "manual" ? '<span class="badge">manual</span>' : ""}</span>
        </div>`).join("")
    : `<p style="font-size:13px; color:var(--ink-2);">No price emails matched yet.</p>`;

  const log = document.getElementById("notif-log");
  const notifs = watch.notifications || [];
  log.innerHTML = notifs.length
    ? notifs.map((n) => `
        <div class="event-row">
          <span>${FD.escapeHtml(n.message)}</span>
          <span class="meta">${new Date(n.sent_at).toLocaleString()} ${n.success ? "" : "· failed"}</span>
        </div>`).join("")
    : `<p style="font-size:13px; color:var(--ink-2);">No notifications sent yet.</p>`;

  document.getElementById("edit-watch").addEventListener("click", () => renderEditForm(watch));

  document.getElementById("deactivate").addEventListener("click", async () => {
    try {
      await FD.api(`/api/watch/${watch.id}`, { method: "PATCH", body: JSON.stringify({ active: !watch.active }) });
      FD.toast(watch.active ? "Watch deactivated" : "Watch reactivated", "success");
      load();
    } catch (err) {
      FD.toast(err.message, "error");
    }
  });

  document.getElementById("delete-watch").addEventListener("click", async () => {
    const confirmed = confirm(`Delete "${watch.name}"? This can't be undone - price history and notification logs for this watch will no longer be reachable from the dashboard.`);
    if (!confirmed) return;
    try {
      await FD.api(`/api/watch/${watch.id}`, { method: "DELETE" });
      FD.toast("Watch deleted", "success");
      location.href = "/index.html";
    } catch (err) {
      FD.toast(err.message, "error");
    }
  });
}

function renderEditForm(watch) {
  content.innerHTML = `
    <form id="edit-form">
      <div class="section-label" style="margin-top:0;">Edit watch</div>
      <div class="field">
        <label for="edit-name">Alert name</label>
        <input type="text" id="edit-name" value="${FD.escapeHtml(watch.name)}" required />
      </div>

      <div class="field">
        <label for="edit-routeType">Route type</label>
        <select id="edit-routeType">
          <option value="one-way">One-way</option>
          <option value="return">Return</option>
          <option value="multi-city">Multi-city</option>
        </select>
      </div>

      <div class="section-label">Legs</div>
      <div id="edit-legs"></div>
      <button type="button" class="btn btn-ghost btn-sm" id="edit-add-leg">+ Add leg</button>

      <div class="section-label" style="margin-top:24px;">Passengers</div>
      <div class="leg-row-airports" style="margin-bottom:0;">
        <div class="field">
          <label for="edit-adults">Adults</label>
          <input type="number" id="edit-adults" value="${watch.adults ?? 1}" min="1" step="1" />
        </div>
        <div class="field">
          <label for="edit-children">Children</label>
          <input type="number" id="edit-children" value="${watch.children ?? 0}" min="0" step="1" />
        </div>
      </div>

      <div class="section-label" style="margin-top:24px;">Pricing</div>
      <div class="field">
        <label for="edit-targetPrice">Target price</label>
        <input type="number" id="edit-targetPrice" value="${watch.target_price ?? ""}" min="0" step="1" />
      </div>
      <div class="field">
        <label for="edit-currency">Currency</label>
        <select id="edit-currency">
          <option value="AUD">AUD (A$)</option>
          <option value="USD">USD ($)</option>
          <option value="GBP">GBP (£)</option>
          <option value="EUR">EUR (€)</option>
          <option value="NZD">NZD (NZ$)</option>
          <option value="CAD">CAD (C$)</option>
          <option value="JPY">JPY (¥)</option>
        </select>
      </div>

      <div class="section-label" style="margin-top:24px;">Alert platforms</div>
      <div class="card" id="edit-platform-list"></div>

      <div class="section-label" style="margin-top:24px;">Notes</div>
      <div class="field">
        <label for="edit-source">Google Flights alert status</label>
        <input type="text" id="edit-source" value="${FD.escapeHtml(watch.source || "")}" />
      </div>
      <div class="field">
        <label for="edit-notes">Passenger / booking notes</label>
        <textarea id="edit-notes">${FD.escapeHtml(watch.notes || "")}</textarea>
      </div>

      <button type="submit" class="btn btn-primary">Save changes</button>
      <div style="height:10px;"></div>
      <button type="button" class="btn btn-ghost" id="cancel-edit">Cancel</button>
    </form>
  `;

  document.getElementById("edit-routeType").value = watch.route_type || "return";
  document.getElementById("edit-currency").value = watch.currency || "AUD";

  const editPlatformList = document.getElementById("edit-platform-list");
  const editPlatformIds = [];
  (window.FLIGHTDROP_PLATFORMS || []).forEach((p) => {
    const id = `edit-platform-${p.key}`;
    editPlatformIds.push({ id, key: p.key });
    const row = document.createElement("label");
    row.className = "checkbox-row";
    const checked = (watch.platforms || []).includes(p.key) ? "checked" : "";
    row.innerHTML = `<input type="checkbox" id="${id}" ${checked} /> ${FD.escapeHtml(p.label)}`;
    editPlatformList.appendChild(row);
  });

  const editLegsContainer = document.getElementById("edit-legs");

  function addEditLegRow(fromCode = "", toCode = "", date = "") {
    const row = document.createElement("div");
    row.className = "leg-row";
    const fromCity = codeToCity(fromCode);
    const toCity = codeToCity(toCode);
    row.innerHTML = `
      <div class="leg-row-airports">
        <div class="airport-picker">
          <input type="text" placeholder="From (city or code)" class="leg-from" autocomplete="off"
            value="${fromCity ? FD.escapeHtml(`${fromCity} (${fromCode})`) : FD.escapeHtml(fromCode)}"
            data-code="${FD.escapeHtml(fromCode)}" />
        </div>
        <div class="airport-picker">
          <input type="text" placeholder="To (city or code)" class="leg-to" autocomplete="off"
            value="${toCity ? FD.escapeHtml(`${toCity} (${toCode})`) : FD.escapeHtml(toCode)}"
            data-code="${FD.escapeHtml(toCode)}" />
        </div>
      </div>
      <div class="leg-row-date-remove">
        <input type="date" class="leg-date" value="${FD.escapeHtml(date)}" aria-label="Departure date (optional)" />
        <button type="button" class="btn btn-ghost btn-sm remove-leg" aria-label="Remove leg">✕</button>
      </div>
    `;
    row.querySelector(".remove-leg").addEventListener("click", () => row.remove());
    FD.initAirportPicker(row.querySelector(".leg-from"));
    FD.initAirportPicker(row.querySelector(".leg-to"));
    editLegsContainer.appendChild(row);
  }

  const existingLegs = watch.legs && watch.legs.length ? watch.legs : [{ from: "", to: "" }];
  existingLegs.forEach((l) => addEditLegRow(l.from || "", l.to || "", l.date || ""));

  document.getElementById("edit-add-leg").addEventListener("click", () => addEditLegRow());
  document.getElementById("cancel-edit").addEventListener("click", () => render(watch));

  document.getElementById("edit-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const legs = [...editLegsContainer.querySelectorAll(".leg-row")].map((row) => ({
      from: row.querySelector(".leg-from").dataset.code || "",
      to: row.querySelector(".leg-to").dataset.code || "",
      date: row.querySelector(".leg-date").value || null,
    })).filter((l) => l.from || l.to);

    const platforms = editPlatformIds
      .filter((p) => document.getElementById(p.id).checked)
      .map((p) => p.key);

    const patch = {
      name: document.getElementById("edit-name").value.trim(),
      route_type: document.getElementById("edit-routeType").value,
      legs,
      target_price: document.getElementById("edit-targetPrice").value ? Number(document.getElementById("edit-targetPrice").value) : null,
      currency: document.getElementById("edit-currency").value,
      adults: Math.max(1, Number(document.getElementById("edit-adults").value) || 1),
      children: Math.max(0, Number(document.getElementById("edit-children").value) || 0),
      source: document.getElementById("edit-source").value.trim(),
      notes: document.getElementById("edit-notes").value.trim(),
      platforms,
    };

    try {
      await FD.api(`/api/watch/${watch.id}`, { method: "PATCH", body: JSON.stringify(patch) });
      FD.toast("Watch updated", "success");
      load();
    } catch (err) {
      FD.toast(err.message, "error");
    }
  });
}

function formatAiText(text) {
  // Escape first, then convert newlines to <br> - never trust LLM output any
  // more than any other external text when inserting into innerHTML.
  return FD.escapeHtml(text).replace(/\n/g, "<br>");
}

function renderAiSuggestion(container, watch) {
  const updatedLabel = watch.ai_suggestion_updated_at
    ? `Last generated ${new Date(watch.ai_suggestion_updated_at).toLocaleDateString(undefined, { month: "short", day: "numeric" })}`
    : "";

  container.innerHTML = `
    ${watch.ai_suggestion
      ? `<div style="font-size:13px; color:var(--ink-1); line-height:1.6; margin-bottom:12px;">${formatAiText(watch.ai_suggestion)}</div>`
      : `<p style="font-size:13px; color:var(--ink-2); margin-top:0;">No suggestion yet - get a rough sense of what a good price looks like for this trip based on the route and your notes.</p>`
    }
    <button class="btn btn-ghost btn-sm" id="get-ai-suggestion">${watch.ai_suggestion ? "Refresh suggestion" : "Get AI price suggestion"}</button>
    ${updatedLabel ? `<div style="font-size:11px; color:var(--ink-2); margin-top:6px;">${updatedLabel}</div>` : ""}
  `;

  document.getElementById("get-ai-suggestion").addEventListener("click", async (e) => {
    const btn = e.target;
    btn.disabled = true;
    btn.textContent = "Thinking...";
    try {
      const result = await FD.api(`/api/watch/${watch.id}/suggest-price`, { method: "POST" });
      watch.ai_suggestion = result.suggestion;
      watch.ai_suggestion_updated_at = new Date().toISOString();
      renderAiSuggestion(container, watch);
    } catch (err) {
      FD.toast(err.message, "error");
      btn.disabled = false;
      btn.textContent = watch.ai_suggestion ? "Refresh suggestion" : "Get AI price suggestion";
    }
  });
}

load();
</script>
</body>
</html>
